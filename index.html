<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Key Leak Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117; color: #e1e4e8; min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; color: #f0f6fc; margin-bottom: 8px; }
  .header p { color: #8b949e; font-size: 14px; }

  .status-badge {
    display: inline-block; padding: 4px 14px; border-radius: 12px;
    font-size: 13px; font-weight: 600; margin-top: 12px;
  }
  .status-success { background: #1a3a2a; color: #3fb950; border: 1px solid #3fb950; }
  .status-nokeys { background: #3a2a1a; color: #d29922; border: 1px solid #d29922; }
  .status-fail { background: #3a1a1a; color: #f85149; border: 1px solid #f85149; }
  .status-loading { background: #1a2a3a; color: #58a6ff; border: 1px solid #58a6ff; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .stat-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 24px; text-align: center;
  }
  .stat-card .value { font-size: 36px; font-weight: 700; color: #f0f6fc; }
  .stat-card .label { font-size: 13px; color: #8b949e; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .section { margin-bottom: 32px; }
  .section h2 { font-size: 18px; color: #f0f6fc; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #30363d; }

  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { width: 120px; font-size: 13px; color: #c9d1d9; text-align: right; text-transform: capitalize; }
  .bar-track { flex: 1; height: 24px; background: #1c2128; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .bar-fill.openai { background: #58a6ff; }
  .bar-fill.anthropic { background: #d2a8ff; }
  .bar-fill.google { background: #3fb950; }
  .bar-fill.replicate { background: #f0883e; }
  .bar-fill.fireworks { background: #f85149; }
  .bar-fill.huggingface { background: #ff7b72; }
  .bar-fill.github { background: #58a6ff; }
  .bar-fill.pastebin { background: #d2a8ff; }
  .bar-fill.valid { background: #3fb950; }
  .bar-fill.valid_no_credits { background: #d29922; }
  .bar-fill.invalid { background: #f85149; }
  .bar-fill.unverified { background: #8b949e; }
  .bar-fill.error { background: #f85149; }
  .bar-count { width: 50px; font-size: 13px; color: #8b949e; text-align: left; }

  .mini-table { width: 100%; border-collapse: collapse; }
  .mini-table th {
    text-align: left; font-size: 12px; color: #8b949e; text-transform: uppercase;
    padding: 8px 12px; border-bottom: 1px solid #30363d;
  }
  .mini-table td {
    padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #21262d;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .mini-table tr:last-child td { border-bottom: none; }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .tag-openai { background: #0a2a4a; color: #58a6ff; }
  .tag-anthropic { background: #2a1a3a; color: #d2a8ff; }
  .tag-google { background: #0a2a1a; color: #3fb950; }
  .tag-replicate { background: #2a1a0a; color: #f0883e; }
  .tag-fireworks { background: #2a0a0a; color: #f85149; }
  .tag-huggingface { background: #2a0a0a; color: #ff7b72; }
  .tag-valid { background: #0a2a1a; color: #3fb950; }
  .tag-valid_no_credits { background: #2a2a0a; color: #d29922; }
  .tag-invalid { background: #2a0a0a; color: #f85149; }
  .tag-unverified { background: #1a1a2a; color: #8b949e; }
  .tag-error { background: #2a0a0a; color: #f85149; }

  .footer { text-align: center; font-size: 12px; color: #484f58; margin-top: 40px; padding: 20px 0; border-top: 1px solid #21262d; }

  .error-msg {
    background: #2a0a0a; border: 1px solid #f85149; border-radius: 8px;
    padding: 20px; text-align: center; margin-bottom: 32px;
  }
  .error-msg p { color: #f85149; font-size: 14px; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>API Key Leak Scanner</h1>
    <p>Monitoring public sources for exposed credentials</p>
    <div id="statusBadge" class="status-badge status-loading">Checking...</div>
  </div>

  <div id="errorDisplay" class="error-msg" style="display:none">
    <p>No scan data available yet. First scan is running...</p>
  </div>

  <div id="content" style="display:none">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="value" id="totalFounded">-</div>
        <div class="label">Founded</div>
      </div>
      <div class="stat-card">
        <div class="value" id="totalNew">-</div>
        <div class="label">New</div>
      </div>
      <div class="stat-card">
        <div class="value" id="totalCumulative">-</div>
        <div class="label">Cumulative</div>
      </div>
      <div class="stat-card">
        <div class="value" id="totalCpm">-</div>
        <div class="label">CPM</div>
      </div>
    </div>

    <div class="section">
      <h2>By Provider</h2>
      <div class="bar-chart" id="providerChart"></div>
    </div>

    <div class="section">
      <h2>By Source</h2>
      <div class="bar-chart" id="sourceChart"></div>
    </div>

    <div class="section">
      <h2>By Status</h2>
      <div class="bar-chart" id="statusChart"></div>
    </div>

    <div class="section" id="recentSection">
      <h2>Recent Matches <span style="font-size:12px;color:#8b949e;font-weight:400">(masked)</span></h2>
      <table class="mini-table">
        <thead><tr><th>Provider</th><th>Key</th><th>Status</th><th>Source</th></tr></thead>
        <tbody id="recentTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">Last scan: <span id="lastScan">-</span> <span id="lastScanAgo"></span></div>
</div>

<script>
async function loadData() {
  try {
    const resp = await fetch('data.json?_=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    const badge = document.getElementById('statusBadge');
    if (data.status === 'success') {
      badge.className = 'status-badge status-success';
      badge.textContent = 'Online - Scan Complete';
    } else if (data.status === 'no_keys_found') {
      badge.className = 'status-badge status-nokeys';
      badge.textContent = 'Online - No Keys Found';
    } else {
      badge.className = 'status-badge status-fail';
      badge.textContent = 'Error';
    }

    document.getElementById('errorDisplay').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('lastScan').textContent = data.last_scan || '-';
    updateAgo();

    document.getElementById('totalFounded').textContent = data.total_founded ?? 0;
    document.getElementById('totalNew').textContent = data.total_founded ?? 0;
    document.getElementById('totalCumulative').textContent = data.cumulative ?? 0;
    document.getElementById('totalCpm').textContent = data.cpm ?? 0;

    const allProviders = { openai: 0, anthropic: 0, google: 0, replicate: 0, fireworks: 0, huggingface: 0 };
    const allSources = { github: 0, pastebin: 0 };
    const allStatuses = { valid: 0, valid_no_credits: 0, invalid: 0, unverified: 0, error: 0 };

    mergeInto(allProviders, data.by_provider || {});
    mergeInto(allSources, data.by_source || {});
    mergeInto(allStatuses, data.by_status || {});

    const providerCount = Object.keys(allProviders).filter(k => allProviders[k] > 0).length;
    const sourceCount = Object.keys(allSources).filter(k => allSources[k] > 0).length;
    
    

    renderBars('providerChart', allProviders, 'bar-fill');
    renderBars('sourceChart', allSources, 'bar-fill');
    renderBars('statusChart', allStatuses, 'bar-fill');

    const tbody = document.getElementById('recentTableBody');
    tbody.innerHTML = '';
    if (data.recent_masked && data.recent_masked.length > 0) {
      data.recent_masked.forEach(item => {
        const tr = document.createElement('tr');
        const provTag = item.provider ? item.provider.toLowerCase().replace(/\s+/g, '') : '';
        tr.innerHTML = `
          <td><span class="tag tag-${provTag}">${item.provider || '-'}</span></td>
          <td style="color:#8b949e">${item.masked || '-'}</td>
          <td><span class="tag tag-${item.status || 'unverified'}">${item.status || '-'}</span></td>
          <td>${item.source || '-'}</td>
        `;
        tbody.appendChild(tr);
      });
    } else {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#8b949e">No matches recorded</td></tr>';
    }
  } catch (e) {
    document.getElementById('statusBadge').className = 'status-badge status-loading';
    document.getElementById('statusBadge').textContent = 'Awaiting Data';
    document.getElementById('errorDisplay').style.display = 'block';
    document.getElementById('content').style.display = 'block';
    document.getElementById('lastScan').textContent = 'Not yet available';
  }
}

function timeAgo(isoString) {
  if (!isoString || isoString === '-') return '';
  const now = Date.now();
  const date = new Date(isoString);
  const seconds = Math.floor((now - date) / 1000);
  if (seconds < 5) return 'just now';
  if (seconds < 60) return seconds + 's ago';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + 'm ago';
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  return days + 'd ago';
}

function updateAgo() {
  const el = document.getElementById('lastScan');
  const elAgo = document.getElementById('lastScanAgo');
  if (el.textContent && el.textContent !== '-' && el.textContent !== 'Not yet available') {
    elAgo.textContent = '(' + timeAgo(el.textContent) + ')';
  }
}

function mergeInto(target, source) {
  for (const key in source) {
    if (target.hasOwnProperty(key)) {
      target[key] = source[key];
    }
  }
}

function renderBars(containerId, data, fillClass) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const entries = Object.entries(data);
  if (entries.length === 0) {
    container.innerHTML = '<div style="color:#8b949e;font-size:13px">No data</div>';
    return;
  }
  const maxVal = Math.max(...entries.map(([,v]) => v));
  entries.forEach(([key, val]) => {
    const pct = maxVal > 0 ? (val / maxVal) * 100 : 0;
    const cls = key.toLowerCase().replace(/\s+/g, '_');
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label">${key}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="bar-count">${val}</div>
    `;
    container.appendChild(row);
  });
}

loadData();
setInterval(loadData, 60000);
setInterval(updateAgo, 5000);
</script>
</body>
</html>
